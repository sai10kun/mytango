<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI自動単語帳（お試し版）</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            width: 300px;
            height: 200px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
            padding: 20px;
            text-align: center;
        }
        .card:active {
            transform: scale(0.98);
        }
        .hint {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card" id="wordCard" onclick="toggleCard()">
        Apple
    </div>
    
    <div class="hint">カードをタップすると意味が変わるよ！</div>

    <script>
        // 単語のデータ（仮）
        const wordData = {
            front: "Apple",
            back: "りんご"
        };
        
        let isFront = true;
        const cardElement = document.getElementById('wordCard');

        // タップしたときに表と裏を切り替える仕組み
        function toggleCard() {
            if (isFront) {
                cardElement.innerText = wordData.back;
                cardElement.style.backgroundColor = "#e3f2fd"; // 裏面は薄い青に
                isFront = false;
            } else {
                cardElement.innerText = wordData.front;
                cardElement.style.backgroundColor = "white";
                isFront = true;
            }
        }
    </script>

</body>
</html>
